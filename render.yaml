databases:
- name: pekko-games-db
  databaseName: games_ep3z
  user: games_ep3z_user
  plan: free
  region: virginia
  ipAllowList:
  - source: 0.0.0.0/0
    description: everywhere
  postgresMajorVersion: "18"
services:
- type: keyvalue
  name: pekko-game-redis
  plan: free
  region: virginia
  # lobbies are persisted here, not just cached; never evict keys under memory pressure
  maxmemoryPolicy: noeviction
  # empty allow list: reachable only from services in the same Render account/region
  ipAllowList: []
- type: web
  name: pekko-game-service
  runtime: docker
  repo: https://github.com/andy327/pekko-game-service
  plan: free
  envVars:
  - key: PORT
    sync: false
  - key: DB_PASSWORD
    fromDatabase:
      name: pekko-games-db
      property: password
  - key: DB_USER
    sync: false
  - key: DATABASE_URL
    sync: false
  - key: REDIS_URI
    fromService:
      type: keyvalue
      name: pekko-game-redis
      property: connectionString
  - key: JWT_SECRET
    generateValue: true
  region: virginia
  dockerContext: .
  dockerfilePath: ./Dockerfile
  autoDeployTrigger: commit
version: "1"
