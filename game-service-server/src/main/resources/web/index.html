<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pekko Game Service</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Pekko Game Service</h1>
    <div class="header-right">
      <span id="whoami" class="whoami"></span>
      <button id="debug-nav" class="hidden">Debug</button>
      <button id="logout" class="hidden">Log out</button>
    </div>
  </header>

  <!-- Login screen: real email/password auth, with a frictionless "play as guest" path alongside. -->
  <section id="login" class="panel">
    <h2>Sign in</h2>

    <form id="login-form" class="auth-form">
      <input id="login-email" type="email" placeholder="Email" autocomplete="username" required />
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Log in</button>
    </form>
    <p class="muted-line" id="to-register-line">No account? <a href="#" id="to-register">Register</a></p>

    <form id="register-form" class="auth-form hidden">
      <input id="register-username" type="text" placeholder="Display name" autocomplete="username" required />
      <input id="register-email" type="email" placeholder="Email" autocomplete="email" required />
      <input id="register-password" type="password" placeholder="Password (8+ characters)"
             autocomplete="new-password" required />
      <button type="submit">Register</button>
    </form>
    <p class="muted-line hidden" id="to-login-line">Have an account? <a href="#" id="to-login">Log in</a></p>

    <hr />

    <form id="guest-form" class="auth-form">
      <input id="guest-name" type="text" placeholder="Display name" autocomplete="off" required />
      <button type="submit">Play as guest</button>
    </form>

    <p id="login-error" class="error"></p>
  </section>

  <!-- Lobby screen: create a game, or refresh and join an open one. -->
  <section id="lobby" class="panel hidden">
    <h2>Lobbies</h2>
    <div class="row">
      <span>New game:</span>
      <button data-gametype="tictactoe">Tic-Tac-Toe</button>
      <button data-gametype="connectfour">Connect Four</button>
      <button data-gametype="battleship">Battleship</button>
    </div>

    <h3>Your games &amp; lobbies</h3>
    <ul id="my-sessions"></ul>

    <h3>Open lobbies</h3>
    <div class="row">
      <button id="refresh-lobbies">Refresh</button>
      <label for="lobby-filter">Show:</label>
      <select id="lobby-filter">
        <option value="">All games</option>
        <option value="tictactoe">Tic-Tac-Toe</option>
        <option value="connectfour">Connect Four</option>
        <option value="battleship">Battleship</option>
      </select>
    </div>
    <ul id="lobby-list"></ul>
    <p id="lobby-error" class="error"></p>
  </section>

  <!-- Game screen: live board, status line, controls. -->
  <section id="game" class="panel hidden">
    <h2 id="game-title"></h2>
    <p id="game-status" class="status"></p>
    <!-- Drop buttons for column-based games (Connect Four); empty (and hidden) for cell-click games. -->
    <div id="column-controls"></div>
    <div id="board"></div>
    <!-- Shown once a match in this room has finished; offers a rematch (host) or a wait message (guest). -->
    <div id="post-game-bar" class="row hidden">
      <span id="post-game-status" class="status"></span>
      <button id="rematch-btn" class="hidden">Rematch</button>
    </div>
    <div class="row">
      <button id="back-to-lobby">← Lobby</button>
      <button id="start-game" class="hidden">Start game</button>
      <button id="join-as-player" class="hidden">Join this game</button>
      <button id="copy-link">Copy invite link</button>
      <button id="leave-game">Leave</button>
    </div>
    <p id="game-error" class="error"></p>

    <!-- Chat: works while waiting in the lobby and during the game (the server routes by game phase). -->
    <div id="chat">
      <ul id="chat-log"></ul>
      <form id="chat-form" class="row">
        <input id="chat-input" type="text" placeholder="Message…" autocomplete="off" maxlength="500" />
        <button type="submit">Send</button>
      </form>
    </div>
  </section>

  <!-- Debug screen: live actor message trace log (requires tracing enabled server-side). -->
  <section id="debug" class="panel hidden">
    <h2>Trace Debug</h2>
    <p id="debug-status" class="status"></p>
    <div id="trace-log-wrap">
      <table id="trace-log">
        <thead>
          <tr><th>Time</th><th>To</th><th>Message</th></tr>
        </thead>
        <tbody id="trace-log-body"></tbody>
      </table>
    </div>
    <div class="row">
      <button id="debug-back-to-lobby">← Lobby</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
