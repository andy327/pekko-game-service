pekko-game-service {
  db {
    url = "jdbc:postgresql://localhost:5432/gamedb"
    url = ${?DATABASE_URL}
    user = "gameuser"
    user = ${?DB_USER}
    pass = "gamepass"
    pass = ${?DB_PASSWORD}
    poolSize = 8
  }

  http {
    host = "0.0.0.0"
    port = 8080
    port = ${?PORT}
  }

  redis {
    uri = "redis://localhost:6379"
    uri = ${?REDIS_URI}
  }

  chat {
    # Most recent messages retained per match for backscroll (GET /chat); older messages are evicted.
    max-messages = 100
    max-messages = ${?CHAT_MAX_MESSAGES}
  }
}

jwt {
  secret = "local-dev-secret"
  secret = ${?JWT_SECRET}

  # Lifetime of an issued access token (iat/exp claims). Clients re-authenticate on 401;
  # WebSockets validate only at connect, so expiry never drops a live socket.
  ttl = 1h
  ttl = ${?JWT_TTL}
}

auth {
  # Argon2id parameters used to hash account passwords (OWASP baseline; tune to your hardware).
  # Stored hashes are self-describing PHC strings, so these may be raised later and old hashes
  # are transparently upgraded on the next successful login.
  argon2 {
    memory-kib = 19456 # 19 MiB
    memory-kib = ${?ARGON2_MEMORY_KIB}
    iterations = 2
    iterations = ${?ARGON2_ITERATIONS}
    parallelism = 1
    parallelism = ${?ARGON2_PARALLELISM}
  }

  # Throttle + lockout on the auth endpoints (register/login/password), backed by Redis so limits
  # hold across restarts and self-expire (no pruning). All keys are namespaced under "auth-rl:".
  rate-limit {
    enabled = true
    enabled = ${?AUTH_RATE_LIMIT_ENABLED}

    # Per-IP fixed-window throttle: at most `max-attempts` requests to an auth endpoint per `window`,
    # after which that IP gets 429s with a Retry-After until the window resets.
    ip {
      window = 15m
      window = ${?AUTH_RATE_LIMIT_IP_WINDOW}
      max-attempts = 20
      max-attempts = ${?AUTH_RATE_LIMIT_IP_MAX_ATTEMPTS}
    }

    # Per-account lockout: `threshold` failed logins for the same email within `window` locks that
    # account for `duration`. Kept short so an attacker can't trivially lock a victim out for long.
    lockout {
      threshold = 5
      threshold = ${?AUTH_RATE_LIMIT_LOCKOUT_THRESHOLD}
      window = 15m
      window = ${?AUTH_RATE_LIMIT_LOCKOUT_WINDOW}
      duration = 15m
      duration = ${?AUTH_RATE_LIMIT_LOCKOUT_DURATION}
    }
  }

  # Password reset (forgot-password). A single-use, short-lived token is emailed out; only its hash is stored
  # (backed by Redis in production, self-expiring after this TTL) and redeeming it revokes the account's older tokens.
  reset {
    token-ttl = 1h
    token-ttl = ${?AUTH_RESET_TOKEN_TTL}
  }

  # Email-address verification. A single-use token is emailed on registration (and on resend); redeeming it marks the
  # account verified. Non-blocking: unverified accounts can still log in and play. Longer TTL than reset — the
  # verification link is expected to be followed at the user's leisure, not under time pressure.
  verification {
    token-ttl = 24h
    token-ttl = ${?AUTH_VERIFICATION_TOKEN_TTL}
  }
}

# Outbound transactional email for account flows (password reset, and later address verification). The "noop"
# provider drops messages — the default for local runs and CI without credentials; "resend" delivers via the
# Resend HTTP API. Emailed links point back to `base-url` (the web client origin).
email {
  provider = "noop"
  provider = ${?EMAIL_PROVIDER}
  from = "no-reply@example.com"
  from = ${?EMAIL_FROM}
  base-url = "http://localhost:8080"
  base-url = ${?EMAIL_BASE_URL}
  resend {
    api-key = ""
    api-key = ${?RESEND_API_KEY}
  }
}

# Actor message tracing — disabled by default (zero overhead when off).
# Uncomment and set enabled = true to activate. sample-rate is the default applied to every message type;
# message-sample-rates overrides it per message type (e.g. to sample down a hot type like MakeMove without losing
# visibility into everything else). See TracingConfig for full documentation.
#
# pekko-game-service.tracing {
#   enabled = true
#   sample-rate = 1.0
#   buffer-size = 1000
#   message-sample-rates {
#     "MakeMove" = 0.1
#   }
# }

pekko.http.server {
  # Expose the peer's address to `extractClientIP` so the auth rate limiter can key on it for
  # direct connections. Behind a proxy (e.g. Render) the real client comes from X-Forwarded-For.
  remote-address-attribute = on

  # Send a WebSocket ping if no data has flowed for this duration, keeping
  # connections alive during long pauses between moves.
  websocket.periodic-keep-alive-max-idle = 30s
}
