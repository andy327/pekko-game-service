pekko-game-service {
  db {
    url = "jdbc:postgresql://localhost:5432/gamedb"
    url = ${?DATABASE_URL}
    user = "gameuser"
    user = ${?DB_USER}
    pass = "gamepass"
    pass = ${?DB_PASSWORD}
    poolSize = 8
  }

  http {
    host = "0.0.0.0"
    port = 8080
    port = ${?PORT}
  }

  redis {
    uri = "redis://localhost:6379"
    uri = ${?REDIS_URI}
  }
}

jwt {
  secret = "local-dev-secret"
  secret = ${?JWT_SECRET}
}

pekko.http.server {
  # Send a WebSocket ping if no data has flowed for this duration, keeping
  # connections alive during long pauses between moves.
  websocket.periodic-keep-alive-max-idle = 30s
}
